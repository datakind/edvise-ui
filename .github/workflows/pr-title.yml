name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            enhance
            feat
            fix
            infra
            model
            perf
            refactor
            revert
            security
            style
            test
