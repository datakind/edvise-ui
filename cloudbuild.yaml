substitutions:
  _REGION: us-east4
  _MIGRATE_DB: 'false'
  _SERVICE: dev-frontend
steps:
  - name: node
    args:
      - install
    id: INSTALL npm
    entrypoint: npm
  - name: node
    env:
      - NODE_OPTIONS=--max-old-space-size=4096
    args:
      - run
      - build
    id: CREATE vite assets
    entrypoint: npm
  - name: gcr.io/cloud-builders/gsutil
    args:
      - '-c'
      - gsutil -m cp -r public/* gs://${_STATIC_BUCKET}
    id: COPY to gcs bucket
    entrypoint: bash
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - '--builder=gcr.io/buildpacks/builder'
      - '--publish'
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA
    id: BUILD and PUSH with cloudpacks
    entrypoint: pack
  - name: gcr.io/cloud-builders/docker
    args:
      - pull
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA
    id: PULL and TAG latest
  - name: gcr.io/cloud-builders/docker
    args:
      - tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:latest
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: DEPLOY and RUN migration job
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -z "${_MIGRATE_DB}" ] || [ "${_MIGRATE_DB}" = "false" ]; then
          echo "Skipping migration job (_MIGRATE_DB not set or false)"
          exit 0
        fi
        gcloud run jobs deploy dev-migrate \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA \
          --region=${_REGION} \
          --update-env-vars=DB_DATABASE=${_MIGRATE_DB} \
          --execute-now
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - '--image'
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA
      - '--region=${_REGION}'
    id: DEPLOY to cloud run
    entrypoint: gcloud
  - name: curlimages/curl
    args:
      - '-X'
      - POST
      - '-H'
      - 'Content-Type: application/json'
      - '-f'
      - '-d'
      - >-
        {"text":"🚀 *$REPO_NAME* deployed · `$BRANCH_NAME` · $TRIGGER_NAME"}
      - 'https://hooks.slack.com/triggers/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'
    id: notify-slack
timeout: 600s
options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
