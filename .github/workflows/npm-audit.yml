name: npm audit

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '24'
      audit-level:
        required: false
        type: string
        default: high

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=${{ inputs.audit-level }}
