name: ci

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]
    branches: [main, develop, 'release/*']

jobs:
  pr-title:
    uses: datakind/.github/.github/workflows/pr-title.yml@main
    permissions:
      pull-requests: read

  asana:
    uses: datakind/.github/.github/workflows/link-asana-task.yml@feature/shared-workflows
    secrets:
      ASANA_SECRET: ${{ secrets.ASANA_SECRET }}

  dependency-review:
    uses: datakind/.github/.github/workflows/dependency-review.yml@main
    permissions:
      contents: read

  npm-audit:
    uses: datakind/.github/.github/workflows/npm-audit.yml@main
    permissions:
      contents: read

  composer-audit:
    uses: datakind/.github/.github/workflows/composer-audit.yml@main
    permissions:
      contents: read

  # Apps with develop/main branching: PRs into main must come from release/* or hotfix/*
  enforce-targets:
    uses: datakind/.github/.github/workflows/enforce-pr-targets.yml@main

  # Release repos: require CHANGELOG.md updates on PRs to main
  pre-release:
    if: github.base_ref == 'main'
    permissions:
      pull-requests: read
    uses: datakind/.github/.github/workflows/pre-release.yml@main

  # lint / tests: call from here once pull_request triggers are removed from those workflows
  lint:
    uses: ./.github/workflows/lint.yml
  tests:
    uses: ./.github/workflows/tests.yml

  ci:
    needs:
      [
        pr-title,
        asana,
        dependency-review,
        npm-audit,
        composer-audit,
        enforce-targets,
        lint,
        tests,
      ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
      - run: echo "ci passed"
