# Build Laravel image (Docker) and deploy to Cloud Run. Optional: sync public/ to GCS for load-balancer static hosting.
substitutions:
  _REGION: us-east4
  _MIGRATE_DB: 'false'
  _SERVICE: dev-frontend
  _STATIC_BUCKET: ''

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-image
    entrypoint: bash
    args:
      - -c
      - |
        set -eux
        docker build \
          -f Dockerfile \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/web:${COMMIT_SHA}" \
          .

  - name: gcr.io/cloud-builders/docker
    id: upload-static-gcs
    entrypoint: bash
    args:
      - -c
      - |
        set -eux
        if [ -z "${_STATIC_BUCKET}" ] || [ "${_STATIC_BUCKET}" = "" ]; then
          echo "Skipping GCS static upload (set _STATIC_BUCKET on the trigger to enable)."
          exit 0
        fi
        IMG="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/web:${COMMIT_SHA}"
        cid=$$(docker create "$$IMG")
        mkdir -p /workspace/public-gcs
        docker cp "$$cid:/app/public/." /workspace/public-gcs/
        docker rm -f "$$cid"
        gsutil -m cp -r /workspace/public-gcs/* "gs://${_STATIC_BUCKET}/"

  - name: gcr.io/cloud-builders/docker
    id: push-digest
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA'
    waitFor: [build-image, upload-static-gcs]

  - name: gcr.io/cloud-builders/docker
    id: tag-latest
    args:
      - tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:latest'
    waitFor: [push-digest]

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:latest'
    waitFor: [tag-latest]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-migration-job
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -z "${_MIGRATE_DB}" ] || [ "${_MIGRATE_DB}" = "false" ]; then
          echo "Skipping migration job (_MIGRATE_DB not set or false)"
          exit 0
        fi
        gcloud run jobs deploy dev-migrate \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA \
          --region=${_REGION} \
          --update-env-vars=DB_DATABASE=${_MIGRATE_DB} \
          --execute-now
    waitFor: [push-latest]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA'
      - '--region=${_REGION}'
    waitFor: [push-latest]

  - name: curlimages/curl
    id: notify-slack
    args:
      - '-X'
      - POST
      - '-H'
      - 'Content-Type: application/json'
      - '-f'
      - '-d'
      - >-
        {"text":"🚀 *$REPO_NAME* deployed · `$BRANCH_NAME` · $TRIGGER_NAME"}
      - 'https://hooks.slack.com/triggers/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'
    waitFor: [deploy-cloud-run]
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/web:$COMMIT_SHA'
