# Re-import: gcloud compute url-maps import dev-tf-cr-lb-1-url-map --project=dev-sst-02 --global --source=um-url-map-import.yaml
# pathRules under edvise-ui-qa-matcher are byte-aligned with path-matcher-1 (order of /api and /worker path lines).
# hostRules: qa before *
defaultService: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-frontend
hostRules:
- hosts:
  - qa.getedvise.com
  pathMatcher: edvise-ui-qa-matcher
- hosts:
  - '*'
  pathMatcher: path-matcher-1
name: dev-tf-cr-lb-1-url-map
pathMatchers:
- defaultService: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-frontend
  name: path-matcher-1
  pathRules:
  - paths:
    - /api/*
    - /api
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-webapp
  - paths:
    - /worker/*
    - /worker
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-worker
  - paths:
    - /build
    - /build/*
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendBuckets/dev-tf-cr-static-build-1
- defaultService: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-edvise-ui-qa
  name: edvise-ui-qa-matcher
  pathRules:
  - paths:
    - /api/*
    - /api
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-webapp
  - paths:
    - /worker/*
    - /worker
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendServices/dev-tf-cr-lb-1-backend-dev-worker
  - paths:
    - /build
    - /build/*
    service: https://www.googleapis.com/compute/v1/projects/dev-sst-02/global/backendBuckets/dev-tf-cr-static-build-1
