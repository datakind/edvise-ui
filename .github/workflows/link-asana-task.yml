name: Attach PR to Asana task

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review]

jobs:
  create-asana-attachment-job:
    runs-on: ubuntu-latest
    name: Create pull request attachments on Asana tasks
    steps:
      - name: Require Asana task URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const asanaTaskUrl = /https:\/\/app\.asana\.com\/(?:0\/(?:0|[0-9]+)\/(?:task\/)?[0-9]+|1\/[0-9]+\/project\/[0-9]+\/task\/[0-9]+)/i;

            if (!asanaTaskUrl.test(body)) {
              core.setFailed("PR description must include an Asana task URL.");
            }
      - name: Create pull request attachments
        uses: Asana/create-app-attachment-github-action@latest
        id: postAttachment
        with:
          asana-secret: ${{ secrets.ASANA_SECRET }}
      - name: Log output status
        run: echo "Status is ${{ steps.postAttachment.outputs.status }}"
