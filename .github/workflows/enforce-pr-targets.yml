name: enforce-pr-targets

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  check-pr-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR base and head branches
        run: |
          set -euo pipefail
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          if [[ "$BASE" == "develop" && "$HEAD" == "main" ]]; then
            echo "Pull requests into develop cannot use main as the source branch."
            exit 1
          fi

          if [[ "$BASE" == "main" ]]; then
            if [[ "$HEAD" == release/* || "$HEAD" == hotfix/* ]]; then
              exit 0
            fi
            echo "Pull requests into main must come from release/* or hotfix/* branches (got: ${HEAD})."
            exit 1
          fi
