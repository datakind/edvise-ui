name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-commit:
    name: pr-title-check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          titleOnly: true
          validateSingleCommit: false
          requireScope: false
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            model
            perf
            refactor
            revert
            style
            test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
