substitutions:
  _STATIC_BUCKET: dev-sst-02-dev-static
  _MIGRATE_JOB: dev-migrate
  _SERVICE: dev-frontend

steps:
  - name: node
    args:
      - install
    id: INSTALL npm
    entrypoint: npm
  - name: node
    env:
      - NODE_OPTIONS=--max-old-space-size=4096
    args:
      - run
      - build
    id: CREATE vite assets
    entrypoint: npm
  - name: gcr.io/cloud-builders/gsutil
    args:
      - '-c'
      - gsutil -m cp -r public/* gs://${_STATIC_BUCKET}
    id: COPY to gcs bucket
    entrypoint: bash
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - '--trust-builder'
      - '--builder=gcr.io/buildpacks/builder'
      - '--publish'
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
    id: BUILD and PUSH with cloudpacks
    entrypoint: pack
  - name: gcr.io/cloud-builders/docker
    args:
      - pull
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
    id: PULL and TAG latest
  - name: gcr.io/cloud-builders/docker
    args:
      - tag
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:latest
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - run
      - jobs
      - deploy
      - ${_MIGRATE_JOB}
      - >-
        --image=${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
      - '--region=$LOCATION'
      - '--execute-now'
    id: DEPLOY and RUN migration job
    entrypoint: gcloud
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - '--image'
      - ${LOCATION}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/frontend:$COMMIT_SHA
      - '--region=$LOCATION'
    id: DEPLOY to cloud run
    entrypoint: gcloud
  - name: curlimages/curl
    args:
      - '-X'
      - POST
      - '-H'
      - 'Content-Type: application/json'
      - '-f'
      - '-d'
      - >-
        {"text":"🚀 *$REPO_NAME* deployed · `$BRANCH_NAME` · $TRIGGER_NAME · $BUILD_ID"}
      - 'https://hooks.slack.com/triggers/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'
    id: notify-slack
timeout: 600s
options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
