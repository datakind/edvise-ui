name: dependency review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        required: false
        type: string
        default: high

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
